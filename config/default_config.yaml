# Imagic — Default Configuration
# Override any value by editing this file.

app:
  name: Imagic
  log_level: INFO

scanner:
  watch_directories: []
  recursive: true
  follow_symlinks: false
  raw_extensions:
    - .cr2
    - .cr3
    - .nef
    - .arw
    - .raf
    - .orf
    - .rw2
    - .dng
    - .pef

processing:
  max_workers: 4
  export_format: jpeg
  jpeg_quality: 95
  thumbnail_size: [320, 320]

cli_tools:
  # Set absolute paths to the CLI executables on your system.
  # Leave empty for auto-detection (searches PATH, /Applications, Homebrew, etc.)
  darktable_cli: ""
  rawtherapee_cli: ""
  exiftool: ""

ai:
  enabled: true
  keep_threshold: 0.5
  trash_threshold: 0.35
  duplicate_hash_threshold: 5

ui:
  theme: dark
  thumbnail_grid_columns: 5
  show_status_bar: true

security:
  require_activation: false
  license_api_base_url: ""
  license_email: ""
  license_key: ""
  activation_token: ""
