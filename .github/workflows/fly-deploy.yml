# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/
# Disabled: deploying locally with flyctl until FLY_API_TOKEN is configured.
# To re-enable: uncomment the 'on' trigger and set FLY_API_TOKEN in GitHub repo secrets.

name: Fly Deploy
on:
  workflow_dispatch:    # manual-only until token is set
#  push:
#    branches:
#      - main
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group    # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
