name: Pre-Release Security Audit

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install audit tools
        run: pip install pip-audit

      # ── 1. Subprocess injection scan ──
      - name: Check for shell=True
        run: |
          echo "## Subprocess Injection Scan" >> $GITHUB_STEP_SUMMARY
          HITS=$(grep -rn 'shell=True' src/ website/ --include='*.py' || true)
          if [ -n "$HITS" ]; then
            echo "::error::shell=True found in source code"
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$HITS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "SHELL_TRUE_FOUND=1" >> $GITHUB_ENV
          else
            echo "✅ No shell=True usage found" >> $GITHUB_STEP_SUMMARY
          fi

      # ── 2. SQL injection scan ──
      - name: Check for unsafe SQL
        run: |
          echo "## SQL Injection Scan" >> $GITHUB_STEP_SUMMARY
          # Look for f-string or %-format SQL with user inputs
          HITS=$(grep -rn -P '(execute\(f"|execute\(f'\''|execute\("%|\.format\()' src/ website/ --include='*.py' || true)
          if [ -n "$HITS" ]; then
            echo "⚠️ Potential SQL formatting found (review manually):" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$HITS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No unsafe SQL formatting found" >> $GITHUB_STEP_SUMMARY
          fi

      # ── 3. Eval/exec scan ──
      - name: Check for eval/exec
        run: |
          echo "## Dynamic Execution Scan" >> $GITHUB_STEP_SUMMARY
          HITS=$(grep -rn -P '\b(eval|exec|compile)\s*\(' src/ website/ --include='*.py' | grep -v '__pycache__' | grep -v '.pyc' || true)
          if [ -n "$HITS" ]; then
            echo "::error::eval/exec/compile found in source code"
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$HITS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "EVAL_FOUND=1" >> $GITHUB_ENV
          else
            echo "✅ No eval/exec/compile usage found" >> $GITHUB_STEP_SUMMARY
          fi

      # ── 4. Hardcoded secrets scan ──
      - name: Check for hardcoded secrets
        run: |
          echo "## Secrets Scan" >> $GITHUB_STEP_SUMMARY
          HITS=$(grep -rn -iP '(password|secret|api_key|token)\s*=\s*["\x27][^"\x27]{8,}' src/ website/ --include='*.py' \
            | grep -v 'environ' \
            | grep -v 'change-me' \
            | grep -v '__pycache__' \
            | grep -v 'test_' \
            | grep -v '\.pyc' || true)
          if [ -n "$HITS" ]; then
            echo "⚠️ Potential hardcoded secrets (review manually):" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$HITS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No hardcoded secrets found" >> $GITHUB_STEP_SUMMARY
          fi

      # ── 5. SSL verification disabled scan ──
      - name: Check for disabled SSL
        run: |
          echo "## SSL/TLS Scan" >> $GITHUB_STEP_SUMMARY
          HITS=$(grep -rn -P '(verify\s*=\s*False|CERT_NONE|check_hostname\s*=\s*False)' src/ website/ --include='*.py' || true)
          if [ -n "$HITS" ]; then
            echo "::error::SSL verification disabled"
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$HITS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "SSL_DISABLED=1" >> $GITHUB_ENV
          else
            echo "✅ No disabled SSL verification found" >> $GITHUB_STEP_SUMMARY
          fi

      # ── 6. Pickle deserialization scan ──
      - name: Check for unsafe deserialization
        run: |
          echo "## Deserialization Scan" >> $GITHUB_STEP_SUMMARY
          HITS=$(grep -rn -P '(pickle\.load|pickle\.loads|yaml\.load\s*\([^)]*\)\s*$|yaml\.unsafe_load)' src/ website/ --include='*.py' || true)
          if [ -n "$HITS" ]; then
            echo "::error::Unsafe deserialization found"
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$HITS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "PICKLE_FOUND=1" >> $GITHUB_ENV
          else
            echo "✅ No unsafe deserialization found" >> $GITHUB_STEP_SUMMARY
          fi

      # ── 7. Debug flags scan ──
      - name: Check for debug flags
        run: |
          echo "## Debug Flags Scan" >> $GITHUB_STEP_SUMMARY
          HITS=$(grep -rn -P '(debug\s*=\s*True|DEBUG\s*=\s*True|echo\s*=\s*True)' src/ website/ --include='*.py' \
            | grep -v '__pycache__' \
            | grep -v 'test_' \
            | grep -v 'conftest' || true)
          if [ -n "$HITS" ]; then
            echo "⚠️ Debug flags found (review manually):" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$HITS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No debug flags found" >> $GITHUB_STEP_SUMMARY
          fi

      # ── 8. Path traversal scan ──
      - name: Check for path traversal risks
        run: |
          echo "## Path Traversal Scan" >> $GITHUB_STEP_SUMMARY
          # Check for open() with user-controlled paths lacking validation
          HITS=$(grep -rn 'os\.path\.join.*request\|Path.*request' website/ --include='*.py' || true)
          if [ -n "$HITS" ]; then
            echo "⚠️ Paths built from request data (verify is_relative_to checks):" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$HITS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No unguarded path construction found" >> $GITHUB_STEP_SUMMARY
          fi

      # ── 9. Dependency audit ──
      - name: Audit desktop dependencies
        run: |
          echo "## Desktop Dependency Audit" >> $GITHUB_STEP_SUMMARY
          pip-audit -r requirements.txt --desc 2>> audit_errors.txt | tee desktop_audit.txt || true
          if grep -q 'found [1-9]' desktop_audit.txt 2>/dev/null; then
            echo "::warning::Vulnerable desktop dependencies found"
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat desktop_audit.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "DEP_VULN=1" >> $GITHUB_ENV
          else
            echo "✅ No known vulnerabilities in desktop dependencies" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Audit web dependencies
        run: |
          echo "## Web Dependency Audit" >> $GITHUB_STEP_SUMMARY
          pip-audit -r website/requirements.txt --desc 2>> audit_errors.txt | tee web_audit.txt || true
          if grep -q 'found [1-9]' web_audit.txt 2>/dev/null; then
            echo "::warning::Vulnerable web dependencies found"
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat web_audit.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "DEP_VULN=1" >> $GITHUB_ENV
          else
            echo "✅ No known vulnerabilities in web dependencies" >> $GITHUB_STEP_SUMMARY
          fi

      # ── 10. Fail on critical findings ──
      - name: Gate release
        run: |
          FAILED=0
          if [ "${SHELL_TRUE_FOUND}" = "1" ]; then
            echo "::error::BLOCKING: shell=True found — command injection risk"
            FAILED=1
          fi
          if [ "${EVAL_FOUND}" = "1" ]; then
            echo "::error::BLOCKING: eval/exec/compile found — code injection risk"
            FAILED=1
          fi
          if [ "${SSL_DISABLED}" = "1" ]; then
            echo "::error::BLOCKING: SSL verification disabled"
            FAILED=1
          fi
          if [ "${PICKLE_FOUND}" = "1" ]; then
            echo "::error::BLOCKING: Unsafe deserialization found"
            FAILED=1
          fi
          if [ "$FAILED" = "1" ]; then
            echo ""
            echo "❌ Security audit FAILED — fix critical findings before releasing."
            exit 1
          else
            echo "✅ Security audit passed — no blocking findings."
          fi

      # ── Create issue on failure ──
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🔒 Security audit failed for ${context.ref}`;
            const body = [
              `**Tag:** \`${context.ref}\``,
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `The pre-release security audit found blocking vulnerabilities.`,
              `Review the workflow summary for details and fix before releasing.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'automated'],
            });
