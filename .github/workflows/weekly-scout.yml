name: Weekly Competitive Intel

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC (1 hour after audit)
  workflow_dispatch:        # Manual trigger

permissions:
  contents: read
  issues: write

jobs:
  scout:
    name: Competitive Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet requests beautifulsoup4

      - name: Fetch competitor updates
        id: fetch
        run: |
          python3 << 'PYEOF'
          import json, re, sys, os
          from datetime import datetime, timedelta
          import requests
          from bs4 import BeautifulSoup

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (compatible; imagic-scout/1.0; competitive-analysis)"
          }
          TIMEOUT = 15

          # Competitors and their release/changelog/what's-new pages
          COMPETITORS = {
              "Adobe Lightroom": [
                  "https://www.adobe.com/products/photoshop-lightroom/features.html",
                  "https://www.adobe.com/products/photoshop-lightroom-classic/features.html",
                  "https://blog.adobe.com/en/topics/photography",
              ],
              "Capture One": [
                  "https://www.captureone.com/en/whats-new",
                  "https://www.captureone.com/en/features",
              ],
              "DxO PhotoLab": [
                  "https://www.dxo.com/dxo-photolab/whats-new/",
                  "https://www.dxo.com/dxo-photolab/features/",
              ],
              "Luminar Neo": [
                  "https://skylum.com/luminar/features",
                  "https://skylum.com/blog",
              ],
              "ON1 Photo RAW": [
                  "https://www.on1.com/products/photo-raw/whats-new/",
                  "https://www.on1.com/products/photo-raw/features/",
              ],
              "darktable": [
                  "https://www.darktable.org/blog/",
                  "https://www.darktable.org/about/features/",
              ],
          }

          results = {}

          for name, urls in COMPETITORS.items():
              snippets = []
              for url in urls:
                  try:
                      resp = requests.get(url, headers=HEADERS, timeout=TIMEOUT)
                      resp.raise_for_status()
                      soup = BeautifulSoup(resp.text, "html.parser")

                      # Remove nav, footer, script, style
                      for tag in soup(["nav", "footer", "script", "style", "header"]):
                          tag.decompose()

                      text = soup.get_text(separator="\n", strip=True)
                      # Take first 3000 chars of meaningful content
                      lines = [l.strip() for l in text.split("\n") if len(l.strip()) > 20]
                      snippet = "\n".join(lines[:80])
                      if snippet:
                          snippets.append({"url": url, "content": snippet[:3000]})
                  except Exception as e:
                      snippets.append({"url": url, "error": str(e)})

              results[name] = snippets

          # Write results for next step
          output_path = os.environ.get("GITHUB_OUTPUT", "/dev/null")

          with open("competitor_data.json", "w") as f:
              json.dump(results, f, indent=2)

          # Build summary
          summary = []
          for name, snippets in results.items():
              ok = sum(1 for s in snippets if "content" in s)
              err = sum(1 for s in snippets if "error" in s)
              summary.append(f"- **{name}**: {ok} pages fetched, {err} errors")

          summary_text = "\n".join(summary)
          print(summary_text)

          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as f:
              f.write("## Competitor Pages Fetched\n\n")
              f.write(summary_text + "\n")
          PYEOF

      - name: Analyse and build report
        id: report
        run: |
          python3 << 'PYEOF'
          import json, os

          with open("competitor_data.json") as f:
              data = json.load(f)

          # imagic's key features — COMPLETE inventory (verified against codebase)
          IMAGIC_FEATURES = {
              # --- AI & Machine Learning ---
              "AI culling / quality scoring (5-metric: sharpness, exposure, noise, composition, detail)",
              "AI auto-enhance (one-click optimise)",
              "AI auto white balance (grey-world algorithm)",
              "AI denoise (button + luminance/colour NR sliders)",
              "AI smart sharpen (adaptive sharpening)",
              "AI super-resolution upscaling (Real-ESRGAN / OpenCV DNN 2x/4x)",
              "AI enhance details",
              "AI B&W conversion",
              "AI crop suggestion",
              "AI visual refinement (post-adjustment validation)",
              "AI variation engine (6 curated flavours + seeded jitter)",
              "CLIP content tagging (zero-shot semantic classification)",
              "Subject/sky/people/background segmentation (rembg U2-Net)",
              "Depth estimation (MiDaS monocular)",
              "Face detection (OpenCV Haar-based, size/framing/sharpness/eye scoring)",
              "Scene detection (Portrait, Landscape, Night, Indoor, Macro)",
              "Adaptive presets (auto-select PP3 profile per scene)",
              "Feedback learner (learns from user decisions to improve auto-pick)",
              # --- Culling & Organisation ---
              "Duplicate detection (perceptual hash + Hamming distance)",
              "Burst detection (EXIF timestamp-based clustering)",
              "Keep/Trash/Review status system",
              "Filter bar (status and score range filters)",
              "Thumbnail grid with zoom (1-10 columns, Ctrl+Scroll)",
              "Library zoom slider",
              "Culling preview dialog (colour-coded, per-metric verdicts)",
              "SQLite photo library (crash-resilient)",
              # --- Editing Controls ---
              "Tonal controls (exposure, contrast, highlights, shadows, whites, blacks, clarity, dehaze)",
              "Tone curve (interactive, per-channel R/G/B/Luminance)",
              "HSL colour mixer (8-channel: R/O/Y/G/Aq/B/P/M)",
              "Colour grading / split toning (shadow/highlight hue+sat+balance)",
              "3-way colour wheels (shadow/midtone/highlight + luminance)",
              "Colour grade presets (8 built-in + intensity slider)",
              "Scene presets (5 built-in: balanced, bright outdoor, high contrast, low light, portrait)",
              "Texture slider",
              "Local contrast (radius + lightness)",
              "Micro contrast / detail slider",
              "Sharpening (amount + radius) & noise reduction (luminance + colour NR)",
              "Vignette (amount + midpoint)",
              "Grain / film simulation",
              "Soft light effect / blend mode",
              "Lens correction (distortion, chromatic aberration, perspective H/V)",
              # --- Editing Tools ---
              "Crop tool (free + aspect ratio lock: 1:1, 3:2, 4:3, 16:9, etc.)",
              "Rule of thirds overlay (crop grid)",
              "Manual masking (brush & lasso with feathered blend)",
              "Before/after comparison (side-by-side + vertical modes)",
              "Live RGB histogram (luminance + per-channel)",
              "Undo/redo (full edit history, Ctrl+Z/Y)",
              "Copy/paste edits (clipboard for parameters)",
              "Reset all edits (one-button)",
              "Double-click slider reset to default",
              "Custom preset save/load",
              "Expert mode toggle (advanced RawTherapee controls)",
              # --- Editing UX ---
              "Zoom controls (Fit, 50%, 100%, 200%)",
              "Scroll wheel zoom (up to 400%)",
              "Pan/drag when zoomed",
              "Film strip (horizontal scrollable thumbnails)",
              "Photo navigation (Prev/Next + keyboard arrows)",
              "Photo info display (dimensions, ISO, shutter, etc.)",
              "Keyboard shortcuts (14 documented)",
              "Batch colour grade application (all photos)",
              # --- Import ---
              "Multi-format RAW support (CR2, CR3, NEF, ARW, DNG, ORF, RW2, RAF, PEF, SRW, X3F, 3FR, IIQ, RWL, MRW + JPEG/PNG/TIFF/WebP)",
              "Recursive folder scanning with symlink support",
              "Already-imported file skip (deduplication on import)",
              "Auto thumbnail generation",
              "Import resume capability (crash-resilient)",
              # --- Export ---
              "Batch export (JPEG, PNG, TIFF with format selection)",
              "Export quality slider (JPEG 1-100)",
              "Max file size enforcement (binary search quality optimisation)",
              "ICC profile preservation",
              "RawTherapee CLI integration",
              "Native Python RAW processor (fallback when CLI unavailable)",
              "PP3 profile generation per photo",
              "XMP sidecar metadata",
              "Multi-threaded export worker pool",
              "Re-export failed photos",
              # --- Workflow ---
              "5-step linear workflow (Import → Analyse → Review → Edit → Export)",
              "Auto-advance between steps",
              "Processing view (task status table with duration tracking)",
              "Clear completed tasks",
              # --- Platform ---
              "100% local processing (no cloud)",
              "One-time purchase ($10, no subscription)",
              "Auto-update checker (background version detection)",
              "License activation dialog",
              "Trash photo (Del key)",
              "Library clear (menu)",
          }

          # Keywords that signal features imagic is genuinely missing.
          # EXCLUDED (imagic already has these):
          #   - AI denoise (photo_editor.py L2079, L3316 + NR sliders)
          #   - Lens correction profiles (preview_engine.py L342, distortion/CA/perspective sliders)
          #   - Tone curve / curves (photo_editor.py L1971, per-channel R/G/B)
          #   - HSL colour mixer (photo_editor.py L1880-1911, 8-channel H/S/L)
          #   - Split toning (photo_editor.py L1935-1950, shadow/highlight hue+sat+balance)
          #   - Face detection (ai/face_detection.py)
          #   - AI auto WB, AI sharpen, AI super-res, AI enhance details
          #   - Subject/sky segmentation (ai/masking.py)
          #   - Depth estimation (ai/depth.py)
          FEATURE_KEYWORDS = {
              "AI generative sky replacement": ["sky replacement", "sky swap", "replace sky"],
              "AI generative object removal": ["generative remove", "content-aware remove", "generative erase", "generase", "content-aware fill"],
              "AI portrait beautification": ["portrait relight", "skin smoothing", "body ai", "face retouch"],
              "Tethered capture": ["tethered", "tethering", "capture from camera"],
              "Cloud sync": ["cloud sync", "sync across devices", "cross-device sync", "cloud storage"],
              "Mobile app": ["mobile app", "iphone app", "ipad app", "android app"],
              "Watermarking": ["watermark"],
              "Panorama stitching": ["panorama", "photo merge panorama", "pano stitch"],
              "HDR merge": ["hdr merge", "merge to hdr", "hdr bracketing"],
              "Focus stacking": ["focus stacking", "focus merge"],
              "Radial/graduated filters": ["radial filter", "graduated filter"],
              "Healing/clone tool": ["healing brush", "clone stamp", "spot removal", "heal tool"],
              "Soft proofing": ["soft proof", "soft proofing"],
              "Map/GPS view": ["map view", "geotagging", "geolocation view"],
              "Facial recognition / people tagging": ["facial recognition", "face recognition", "people tagging", "face tagging"],
              "Video support": ["video editing", "video clip", "video support"],
              "Plugin/extension system": ["plugin system", "extension marketplace", "add-on marketplace"],
              "Colour calibration (ColorChecker)": ["colorchecker", "color calibration profile"],
          }

          report_lines = ["# Weekly Competitive Intelligence Report\n"]
          report_lines.append(f"*Auto-generated on {os.popen('date -u +%Y-%m-%d').read().strip()}*\n")

          detected_features = {}

          for competitor, snippets in data.items():
              report_lines.append(f"\n## {competitor}\n")

              content_all = " ".join(
                  s.get("content", "").lower() for s in snippets
              )

              if not content_all.strip():
                  report_lines.append("*Could not fetch content — pages may be dynamic/JS-rendered.*\n")
                  continue

              found = []
              for feature, keywords in FEATURE_KEYWORDS.items():
                  for kw in keywords:
                      if kw in content_all:
                          found.append(feature)
                          if feature not in detected_features:
                              detected_features[feature] = []
                          detected_features[feature].append(competitor)
                          break

              if found:
                  report_lines.append("**Features detected that imagic may lack:**\n")
                  for f in sorted(set(found)):
                      report_lines.append(f"- {f}")
              else:
                  report_lines.append("*No new feature gaps detected from page content.*")

              # Source URLs
              sources = [s["url"] for s in snippets if "content" in s]
              if sources:
                  report_lines.append(f"\nSources: {', '.join(sources)}")

          # Summary section
          report_lines.append("\n\n---\n## Summary: Feature Gaps Across Competitors\n")
          if detected_features:
              report_lines.append("| Missing Feature | Competitors That Have It |")
              report_lines.append("|----------------|------------------------|")
              for feature, comps in sorted(detected_features.items(), key=lambda x: -len(x[1])):
                  report_lines.append(f"| {feature} | {', '.join(sorted(set(comps)))} |")
          else:
              report_lines.append("*No feature gaps detected this week. Pages may need manual review.*")

          report_lines.append("\n\n---\n## imagic's Competitive Advantages\n")
          report_lines.append("These features give imagic an edge — emphasise in marketing:\n")
          advantages = [
              "**AI Culling with 5-metric scoring** — No competitor offers automated quality-based photo culling at this depth",
              "**$10 one-time purchase** — vs $120+/year for Lightroom, $300 for Capture One",
              "**100% local processing** — No cloud dependency, full privacy",
              "**Feedback learner** — Adapts to user preferences over time",
              "**Integrated 5-step workflow** — Import → Analyse → Review → Edit → Export in one window",
              "**Burst detection + duplicate grouping** — Automated best-shot selection from burst groups",
          ]
          for a in advantages:
              report_lines.append(f"- {a}")

          report_lines.append("\n\n---\n*Review this report and invoke `@cto` to prioritise and implement missing features.*")

          report_text = "\n".join(report_lines)

          with open("scout_report.md", "w") as f:
              f.write(report_text)

          # Save for issue creation
          # Truncate if too long for GitHub issue body (65536 char limit)
          if len(report_text) > 60000:
              report_text = report_text[:60000] + "\n\n*...report truncated...*"

          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as f:
              f.write("\n" + report_text)

          # Write report as output
          with open("report_body.txt", "w") as f:
              f.write(report_text)

          # Check if there are any gaps worth reporting
          has_gaps = "true" if detected_features else "false"
          with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as f:
              f.write(f"has_gaps={has_gaps}\n")
              f.write(f"gap_count={len(detected_features)}\n")

          print(f"Found {len(detected_features)} potential feature gaps across {len(data)} competitors.")
          PYEOF

      - name: Create issue with report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('report_body.txt', 'utf8');
            const date = new Date().toISOString().slice(0, 10);

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔍 Competitive Intel Report — ${date}`,
              body: body,
              labels: ['competitive-intel', 'automated']
            });
