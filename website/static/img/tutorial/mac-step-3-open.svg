<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" fill="none">
  <!-- App icon in Finder -->
  <g transform="translate(28, 28)">
    <rect x="0" y="0" width="56" height="56" rx="13" fill="#252525" stroke="#ff9800" stroke-width="1.5"/>
    <text x="28" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#ff9800">i</text>
    <text x="28" y="44" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#ffa726">magic</text>
  </g>
  <text x="56" y="100" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#a0a0a0">imagic</text>

  <!-- Right-click indicator -->
  <g transform="translate(68, 36)">
    <!-- mouse icon -->
    <rect x="0" y="0" width="18" height="26" rx="9" fill="none" stroke="#888" stroke-width="1.2"/>
    <line x1="9" y1="0" x2="9" y2="12" stroke="#888" stroke-width="0.8"/>
    <!-- right side highlight -->
    <path d="M9 0a9 9 0 0 1 9 9v3H9V0z" fill="#ff9800" opacity="0.3"/>
    <text x="9" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#6b6b6b">right click</text>
  </g>

  <!-- Context menu -->
  <g transform="translate(112, 14)">
    <rect x="0" y="0" width="140" height="112" rx="8" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
    <!-- shadow -->
    <rect x="3" y="3" width="140" height="112" rx="8" fill="#000" opacity="0.3"/>
    <rect x="0" y="0" width="140" height="112" rx="8" fill="#2a2a2a" stroke="#444" stroke-width="1"/>

    <!-- Menu items -->
    <text x="14" y="22" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#a0a0a0">Get Info</text>

    <!-- Open — highlighted -->
    <rect x="4" y="28" width="132" height="22" rx="4" fill="#ff9800"/>
    <text x="14" y="43" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">Open</text>
    <text x="126" y="43" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#000" opacity="0.6">⏎</text>

    <text x="14" y="64" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#a0a0a0">Move to Trash</text>
    <line x1="8" y1="72" x2="132" y2="72" stroke="#444" stroke-width="0.5"/>
    <text x="14" y="86" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#a0a0a0">Rename</text>
    <text x="14" y="104" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#a0a0a0">Compress</text>
  </g>

  <!-- "First time only" badge -->
  <g transform="translate(170, 110)">
    <rect x="0" y="0" width="90" height="20" rx="10" fill="#ff9800" opacity="0.15"/>
    <text x="45" y="14" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#ff9800">first time only ✓</text>
  </g>
</svg>
